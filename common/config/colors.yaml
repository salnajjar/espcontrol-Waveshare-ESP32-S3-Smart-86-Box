# =============================================================================
# CONFIG: BUTTON COLORS
# =============================================================================
# Primary (on), secondary (off), and tertiary (sensor card) colours shared
# across all devices. Values are 6-digit hex strings without the # prefix.
# =============================================================================

substitutions:
  button_on_color_initial: "FF8C00"
  button_off_color_initial: "313131"
  sensor_card_color_initial: "212121"

text:
  - platform: template
    name: "${entity_button_on_color}"
    internal: true
    id: button_on_color
    optimistic: true
    restore_value: true
    initial_value: "${button_on_color_initial}"
    min_length: 6
    max_length: 6
    mode: text
    entity_category: config
    icon: "mdi:palette"
    update_interval: never
    web_server:
      sorting_group_id: sg_display

  - platform: template
    name: "${entity_button_off_color}"
    internal: true
    id: button_off_color
    optimistic: true
    restore_value: true
    initial_value: "${button_off_color_initial}"
    min_length: 6
    max_length: 6
    mode: text
    entity_category: config
    icon: "mdi:palette-outline"
    update_interval: never
    web_server:
      sorting_group_id: sg_display

  - platform: template
    name: "${entity_sensor_card_color}"
    internal: true
    id: sensor_card_color
    optimistic: true
    restore_value: true
    initial_value: "${sensor_card_color_initial}"
    min_length: 6
    max_length: 6
    mode: text
    entity_category: config
    icon: "mdi:palette-outline"
    update_interval: never
    web_server:
      sorting_group_id: sg_display
