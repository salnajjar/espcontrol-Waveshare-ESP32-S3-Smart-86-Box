# =============================================================================
# DEVICE - Waveshare ESP32-S3 Smart 86 Box hardware definition
# =============================================================================
# Pin assignments, peripherals, and platform config for the 4" square panel.
# Includes the ESP32-S3 SoC (native WiFi), PCA9554-assisted MIPI RGB display,
# GT911 capacitive touchscreen, and inverted GPIO4 backlight PWM.
# =============================================================================

substitutions:
  espcontrol_component_url: "https://github.com/jtenniswood/espcontrol"
  espcontrol_component_ref: "main"

# ---------------------------------------------------------------------------
# ESP32-S3 platform (16MB flash, ESP-IDF framework)
# ---------------------------------------------------------------------------
esp32:
  board: esp32-s3-devkitc-1
  flash_size: 16MB
  framework:
    type: esp-idf
    version: 5.5.2
    source: https://github.com/pioarduino/esp-idf/releases/download/v5.5.2/esp-idf-v5.5.2.tar.xz
    platform_version: 55.03.37
    sdkconfig_options:
      # The S3 display stack leaves little internal RAM for HTTPS OTA checks.
      # Allocate mbedTLS buffers from PSRAM so firmware downloads can connect.
      CONFIG_MBEDTLS_EXTERNAL_MEM_ALLOC: "y"
      # Keep the ESP32 task watchdog long enough for display startup while
      # remaining compatible with ESPHome 2026.4 and newer.
      CONFIG_ESP_TASK_WDT_TIMEOUT_S: "30"
      # Keep WiFi startup inside the internal-RAM budget after the RGB display
      # and LVGL buffers are initialized.
      CONFIG_ESP_WIFI_STATIC_RX_BUFFER_NUM: "8"
      CONFIG_SPIRAM_TRY_ALLOCATE_WIFI_LWIP: "y"

# ---------------------------------------------------------------------------
# External components
# ---------------------------------------------------------------------------
external_components:
  - source:
      type: git
      url: ${espcontrol_component_url}
      ref: ${espcontrol_component_ref}
      path: components
    components: [espcontrol, web_server_idf, waveshare_s3_86_lcd_preinit, waveshare_s3_86_lcd_postinit]
    refresh: 1s

espcontrol:

# ---------------------------------------------------------------------------
# ESPHome core (device name from substitutions)
# ---------------------------------------------------------------------------
esphome:
  name: ${name}
  friendly_name: ${friendly_name}
  platformio_options:
    build_flags:
      - "-DESPCONTROL_DISABLE_TODO=1"
      - "-DESPCONTROL_MAX_GRID_SLOTS=9"
  on_boot:
    - priority: 800
      then:
        - lambda: |-
            auto reason = esp_reset_reason();
            if (reason == ESP_RST_SW) {
              esp_ota_img_states_t ota_state;
              const esp_partition_t *running = esp_ota_get_running_partition();
              if (running != nullptr &&
                  esp_ota_get_state_partition(running, &ota_state) == ESP_OK &&
                  ota_state == ESP_OTA_IMG_PENDING_VERIFY) {
                ESP_LOGI("s3_reset", "Marking OTA image valid before hardware-reset workaround");
                id(s3_smart86_safe_mode).mark_successful();
                global_preferences->sync();
                esp_sleep_enable_timer_wakeup(100000);
                esp_deep_sleep_start();
                return;
              }
            }
            if (reason == ESP_RST_USB || reason == ESP_RST_SW) {
              esp_sleep_enable_timer_wakeup(100000);
              esp_deep_sleep_start();
            }
    - priority: -100
      then:
        - lambda: 'id(screen_rotation_ready) = true;'
        - script.execute: apply_screen_rotation

# ---------------------------------------------------------------------------
# PSRAM (video frame buffer memory)
# ---------------------------------------------------------------------------
psram:
  mode: octal
  speed: 80MHz

# ---------------------------------------------------------------------------
# OTA updates (ESPHome native + HTTP-based)
# ---------------------------------------------------------------------------
ota:
  - platform: esphome
    on_begin:
      then:
        - script.execute: show_update_writing
        - script.wait: show_update_writing
    on_end:
      then:
        - globals.set:
            id: firmware_update_complete_pending
            value: 'true'
        - lambda: 'global_preferences->sync();'
        - lambda: |-
            esp_sleep_enable_timer_wakeup(100000);
            esp_deep_sleep_start();
    on_error:
      then:
        - script.execute: show_update_failed
  - platform: http_request
    on_begin:
      then:
        - script.execute: show_update_writing
        - script.wait: show_update_writing
    on_end:
      then:
        - globals.set:
            id: firmware_update_complete_pending
            value: 'true'
        - lambda: 'global_preferences->sync();'
        - lambda: |-
            esp_sleep_enable_timer_wakeup(100000);
            esp_deep_sleep_start();
    on_error:
      then:
        - script.execute: show_update_failed

safe_mode:
  id: s3_smart86_safe_mode
  boot_is_good_after: 10s

# ---------------------------------------------------------------------------
# Shared infrastructure (API, logging, web server, restart button)
# ---------------------------------------------------------------------------
packages:
  core_infra: !include ../../../common/device/core_infra.yaml

api:
  listen_backlog: 4
  max_connections: 3
  max_send_queue: 12

logger:
  hardware_uart: USB_SERIAL_JTAG

wifi:
  use_psram: true

# ---------------------------------------------------------------------------
# Backlight (LEDC PWM output + monochromatic light entity)
# ---------------------------------------------------------------------------
output:
  - platform: ledc
    pin: GPIO4
    id: gpio_backlight_pwm
    inverted: true
    frequency: 150Hz
    min_power: 0.01
    zero_means_zero: true

light:
  - platform: monochromatic
    output: gpio_backlight_pwm
    name: Display Backlight
    icon: mdi:lightbulb-on
    id: display_backlight
    restore_mode: RESTORE_DEFAULT_ON
    default_transition_length: 0s
    gamma_correct: 1.0
    on_turn_on:
      then:
        - if:
            condition:
              lambda: |-
                return id(screen_schedule_asleep) ||
                       (id(schedule_enabled).state && !panel_time_or_fallback(id(panel_time).now(), id(homeassistant_time).now()).is_valid());
            then:
              - script.execute: backlight_force_display_off
            else:
              - if:
                  condition:
                    lambda: 'return id(screensaver_display_off_active);'
                  then:
                    - script.execute: screensaver_wake
    on_turn_off:
      then:
        - if:
            condition:
              lambda: |-
                return !id(display_asleep) &&
                       !id(screen_schedule_asleep) &&
                       !id(screensaver_display_off_active) &&
                       !id(screensaver_dimmed_active);
            then:
              - script.execute: screen_schedule_manual_sleep

# ---------------------------------------------------------------------------
# I2C expander, SPI control bus, and touchscreen
# ---------------------------------------------------------------------------
i2c:
  - id: i2c_main
    sda: GPIO47
    scl: GPIO48
    frequency: 400kHz

pca9554:
  - id: io_expander
    pin_count: 8
    i2c_id: i2c_main
    address: 0x20

waveshare_s3_86_lcd_preinit:
  pca9554_id: io_expander

waveshare_s3_86_lcd_postinit:
  pca9554_id: io_expander

spi:
  - id: lcd_spi
    interface: software
    clk_pin:
      pca9554: io_expander
      number: 2
      mode:
        output: true
    mosi_pin:
      pca9554: io_expander
      number: 1
      mode:
        output: true

touchscreen:
  - platform: gt911
    id: my_touchscreen
    display: my_display
    i2c_id: i2c_main
    update_interval: 16ms
    transform:
      mirror_x: false
      mirror_y: false
    on_touch:
      - script.execute: screensaver_wake

# ---------------------------------------------------------------------------
# Display (4" 480x480 ST7701S MIPI RGB panel)
# ---------------------------------------------------------------------------
display:
  - platform: mipi_rgb
    model: CUSTOM
    id: my_display
    dimensions:
      width: 480
      height: 480
    color_order: RGB
    pixel_mode: 18bit
    invert_colors: true
    data_rate: 2MHz
    spi_mode: MODE3
    cs_pin:
      pca9554: io_expander
      number: 0
      mode:
        output: true
    pclk_frequency: 16MHz
    pclk_inverted: true
    hsync_pulse_width: 10
    hsync_back_porch: 10
    hsync_front_porch: 20
    vsync_pulse_width: 10
    vsync_back_porch: 10
    vsync_front_porch: 10
    de_pin: GPIO17
    pclk_pin: GPIO9
    hsync_pin:
      number: GPIO46
      ignore_strapping_warning: true
    vsync_pin:
      number: GPIO3
      ignore_strapping_warning: true
    # ESPHome remaps grouped RGB565 pins to the byte order expected by esp_lcd.
    # The ST7701S is then corrected in the post-init component to BGR + inversion.
    data_pins:
      red:
        - GPIO40
        - GPIO41
        - GPIO42
        - GPIO2
        - GPIO1
      green:
        - GPIO21
        - GPIO8
        - GPIO18
        - GPIO45
        - GPIO38
        - GPIO39
      blue:
        - GPIO10
        - GPIO11
        - GPIO12
        - GPIO13
        - GPIO14
    # Official Waveshare ESP32-S3-Touch-LCD-4B ST7701S initialization table.
    init_sequence:
      - [0x11]
      - delay 120ms
      - [0xFF, 0x77, 0x01, 0x00, 0x00, 0x10]
      - [0xC0, 0x3B, 0x00]
      - [0xC1, 0x0D, 0x02]
      - [0xC2, 0x21, 0x08]
      - [0xCD, 0x08]
      - [0xB0, 0x00, 0x11, 0x18, 0x0E, 0x11, 0x06, 0x07, 0x08, 0x07, 0x22, 0x04, 0x12, 0x0F, 0xAA, 0x31, 0x18]
      - [0xB1, 0x00, 0x11, 0x19, 0x0E, 0x12, 0x07, 0x08, 0x08, 0x08, 0x22, 0x04, 0x11, 0x11, 0xA9, 0x32, 0x18]
      - [0xFF, 0x77, 0x01, 0x00, 0x00, 0x11]
      - [0xB0, 0x60]
      - [0xB1, 0x30]
      - [0xB2, 0x87]
      - [0xB3, 0x80]
      - [0xB5, 0x49]
      - [0xB7, 0x85]
      - [0xB8, 0x21]
      - [0xC1, 0x78]
      - [0xC2, 0x78]
      - delay 20ms
      - [0xE0, 0x00, 0x1B, 0x02]
      - [0xE1, 0x08, 0xA0, 0x00, 0x00, 0x07, 0xA0, 0x00, 0x00, 0x00, 0x44, 0x44]
      - [0xE2, 0x11, 0x11, 0x44, 0x44, 0xED, 0xA0, 0x00, 0x00, 0xEC, 0xA0, 0x00, 0x00]
      - [0xE3, 0x00, 0x00, 0x11, 0x11]
      - [0xE4, 0x44, 0x44]
      - [0xE5, 0x0A, 0xE9, 0xD8, 0xA0, 0x0C, 0xEB, 0xD8, 0xA0, 0x0E, 0xED, 0xD8, 0xA0, 0x10, 0xEF, 0xD8, 0xA0]
      - [0xE6, 0x00, 0x00, 0x11, 0x11]
      - [0xE7, 0x44, 0x44]
      - [0xE8, 0x09, 0xE8, 0xD8, 0xA0, 0x0B, 0xEA, 0xD8, 0xA0, 0x0D, 0xEC, 0xD8, 0xA0, 0x0F, 0xEE, 0xD8, 0xA0]
      - [0xEB, 0x02, 0x00, 0xE4, 0xE4, 0x88, 0x00, 0x40]
      - [0xEC, 0x3C, 0x00]
      - [0xED, 0xAB, 0x89, 0x76, 0x54, 0x02, 0xFF, 0xFF, 0xFF, 0xFF, 0xFF, 0xFF, 0x20, 0x45, 0x67, 0x98, 0xBA]
      - [0xFF, 0x77, 0x01, 0x00, 0x00, 0x00]
    setup_priority: 240
    update_interval: never
    auto_clear_enabled: false
    transform:
      mirror_x: false
      mirror_y: false
      swap_xy: false

# ---------------------------------------------------------------------------
# LVGL base (display binding, must be before any page definitions)
# ---------------------------------------------------------------------------
lvgl:
  id: main_lvgl
  setup_priority: 230
  buffer_size: 12%
  displays: my_display
  rotation: 0
  touchscreens:
    - touchscreen_id: my_touchscreen
      long_press_time: 3s

script:
  - id: apply_screen_rotation
    then:
      - if:
          condition:
            lambda: 'return id(screen_rotation_select).current_option() == "90";'
          then:
            - lvgl.display.set_rotation: 90
          else:
            - if:
                condition:
                  lambda: 'return id(screen_rotation_select).current_option() == "180";'
                then:
                  - lvgl.display.set_rotation: 180
                else:
                  - if:
                      condition:
                        lambda: 'return id(screen_rotation_select).current_option() == "270";'
                      then:
                        - lvgl.display.set_rotation: 270
                      else:
                        - lvgl.display.set_rotation: 0

select:
  - platform: template
    name: "${entity_screen_rotation}"
    internal: true
    disabled_by_default: true
    id: screen_rotation_select
    entity_category: config
    icon: "mdi:screen-rotation"
    optimistic: true
    restore_value: true
    initial_option: "0"
    options:
      - "0"
      - "90"
      - "180"
      - "270"
    on_value:
      then:
        - if:
            condition:
              lambda: 'return id(screen_rotation_ready);'
            then:
              - script.execute: apply_screen_rotation
