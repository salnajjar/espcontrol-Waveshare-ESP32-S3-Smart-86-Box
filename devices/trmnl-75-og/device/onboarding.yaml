# =============================================================================
# ONBOARDING - TRMNL 7.5 OG e-paper setup flow
# =============================================================================
# Monochrome equivalents of the standard EspControl setup pages. TRMNL has no
# touch path for this staged build, so Home Assistant setup advances
# automatically when the API connects.
# =============================================================================

globals:
  - id: boot_grace_period
    type: bool
    initial_value: 'true'

lvgl:
  pages:
    - id: loading_page
      bg_color: 0xFFFFFF
      bg_opa: cover
      scrollable: false
      widgets:
        - obj:
            align: center
            width: $content_width
            height: SIZE_CONTENT
            bg_opa: transp
            border_width: 0
            pad_all: 0
            scrollable: false
            layout:
              type: flex
              flex_flow: COLUMN
              flex_align_main: center
              flex_align_cross: center
              pad_row: $setup_loading_pad_row
            widgets:
              - label:
                  id: loading_status_icon
                  text_font: $setup_icon_font_id
                  text: $icon_wifi_startup
                  text_color: 0x000000
                  text_align: center
              - label:
                  id: loading_status_title
                  text: "Starting up"
                  text_font: $setup_title_font_id
                  text_color: 0x000000
                  width: $content_width
                  text_align: center
              - label:
                  id: loading_status_label
                  text: "Booting"
                  text_font: $setup_body_font_id
                  text_color: 0x000000
                  width: $content_width
                  text_align: center

    - id: wifi_setup_page
      bg_color: 0xFFFFFF
      bg_opa: cover
      scrollable: false
      pad_all: 0
      widgets:
        - obj:
            align: center
            width: $content_width
            height: SIZE_CONTENT
            bg_opa: transp
            border_width: 0
            pad_all: 0
            scrollable: false
            layout:
              type: flex
              flex_flow: COLUMN
              flex_align_main: center
              flex_align_cross: center
              pad_row: $setup_pad_row
            widgets:
              - label:
                  text_font: $setup_icon_font_id
                  text: $icon_wifi
                  text_color: 0x000000
                  text_align: center
              - label:
                  id: wifi_setup_title
                  text: "WiFi Setup"
                  text_font: $setup_title_font_id
                  text_color: 0x000000
                  width: $content_width
                  text_align: center
              - label:
                  id: wifi_setup_instructions
                  text: "Connect to the setup hotspot\nthen open 192.168.4.1"
                  text_font: $setup_body_font_id
                  text_color: 0x000000
                  width: $content_width
                  text_align: center

    - id: ha_setup_page
      bg_color: 0xFFFFFF
      bg_opa: cover
      scrollable: false
      pad_all: 0
      widgets:
        - obj:
            align: center
            width: $content_width
            height: SIZE_CONTENT
            bg_opa: transp
            border_width: 0
            pad_all: 0
            scrollable: false
            layout:
              type: flex
              flex_flow: COLUMN
              flex_align_main: center
              flex_align_cross: center
              pad_row: $setup_pad_row
            widgets:
              - label:
                  text_font: $setup_icon_font_id
                  text: $icon_home_assistant
                  text_color: 0x000000
                  text_align: center
              - label:
                  text: "Home Assistant"
                  text_font: $setup_title_font_id
                  text_color: 0x000000
                  width: $content_width
                  text_align: center
              - label:
                  text: "Add this device in Home Assistant\nto enable control"
                  text_font: $setup_body_font_id
                  text_color: 0x000000
                  width: $content_width
                  text_align: center
              - label:
                  text: "Settings > Devices & Services"
                  text_font: $setup_body_font_id
                  text_color: 0x000000
                  width: $content_width
                  text_align: center

    - id: button_setup_page
      bg_color: 0xFFFFFF
      bg_opa: cover
      scrollable: false
      widgets:
        - obj:
            align: center
            width: $content_width
            height: SIZE_CONTENT
            bg_opa: transp
            border_width: 0
            pad_all: 0
            scrollable: false
            layout:
              type: flex
              flex_flow: COLUMN
              flex_align_main: center
              flex_align_cross: center
              pad_row: $setup_pad_row
            widgets:
              - label:
                  text_font: $setup_icon_font_id
                  text: $icon_cog
                  text_color: 0x000000
                  text_align: center
              - label:
                  text: "Setup"
                  text_font: $setup_title_font_id
                  text_color: 0x000000
                  width: $content_width
                  text_align: center
              - label:
                  text: "Open your browser and\nconfigure your display"
                  text_font: $setup_body_font_id
                  text_color: 0x000000
                  width: $content_width
                  text_align: center
              - label:
                  id: setup_ip_label
                  text: "http://..."
                  text_font: $setup_title_font_id
                  text_color: 0x000000
                  width: $content_width
                  text_align: center

script:
  - id: trmnl_onboarding_refresh
    mode: restart
    then:
      - component.update: epaper

  - id: trmnl_hide_topbar
    mode: restart
    then:
      - lvgl.widget.update:
          id: temperatures
          hidden: true
      - lvgl.widget.update:
          id: display_time
          hidden: true
      - lvgl.widget.update:
          id: network_status_button
          hidden: true

  - id: wifi_show_reconnecting
    mode: restart
    then:
      - script.execute: trmnl_hide_topbar
      - lambda: |-
          network_status_hide_modal();
          lv_label_set_text(id(wifi_setup_title), "WiFi Disconnected");
          lv_label_set_text(id(wifi_setup_instructions), "Trying to reconnect\nto your saved network");
      - lvgl.page.show: wifi_setup_page
      - script.execute: trmnl_onboarding_refresh

  - id: wifi_show_hotspot_setup
    mode: restart
    then:
      - script.execute: trmnl_hide_topbar
      - lambda: |-
          network_status_hide_modal();
          std::string msg = "Connect to WiFi\n${friendly_name}\nOpen 192.168.4.1";
          lv_label_set_text(id(wifi_setup_title), "WiFi Setup");
          lv_label_set_text(id(wifi_setup_instructions), msg.c_str());
      - lvgl.page.show: wifi_setup_page
      - script.execute: trmnl_onboarding_refresh

  - id: wifi_reconnect_flow
    mode: restart
    then:
      - delay: 60s
      - if:
          condition:
            not:
              wifi.connected:
          then:
            - script.execute: wifi_show_reconnecting
            - delay: 30s
            - if:
                condition:
                  not:
                    wifi.connected:
                then:
                  - script.execute: wifi_show_hotspot_setup

  - id: navigate_after_api
    mode: restart
    then:
      - if:
          condition:
            lambda: 'return !id(button_order).state.empty();'
          then:
            - lvgl.page.show: main_page
            - if:
                condition:
                  switch.is_on: clock_bar_enabled
                then:
                  - if:
                      condition:
                        or:
                          - switch.is_on: indoor_temp_enable
                          - switch.is_on: outdoor_temp_enable
                      then:
                        - lvgl.widget.update:
                            id: temperatures
                            hidden: false
                  - lvgl.widget.update:
                      id: display_time
                      hidden: false
                  - if:
                      condition:
                        switch.is_on: network_status_enabled
                      then:
                        - lvgl.widget.update:
                            id: network_status_button
                            hidden: false
                        - script.execute: network_status_refresh
                      else:
                        - lvgl.widget.update:
                            id: network_status_button
                            hidden: true
                        - lambda: 'network_status_hide_modal();'
                else:
                  - script.execute: trmnl_hide_topbar
            - script.execute: trmnl_refresh_display_when_ready
          else:
            - lambda: |-
                auto ips = wifi::global_wifi_component->get_ip_addresses();
                if (!ips.empty()) {
                  char ip_buf[esphome::network::IP_ADDRESS_BUFFER_SIZE];
                  ips[0].str_to(ip_buf);
                  std::string url = "http://" + std::string(ip_buf);
                  lv_label_set_text(id(setup_ip_label), url.c_str());
                }
            - lvgl.page.show: button_setup_page
            - script.execute: trmnl_onboarding_refresh

wifi:
  on_connect:
    - script.stop: wifi_reconnect_flow
    - lambda: |-
        ESP_LOGI("connectivity", "WiFi connected (%lu ms)", millis());
        lv_label_set_text(id(loading_status_label), "Connected");
    - script.execute: network_status_refresh
    - delay: 200ms
    - if:
        condition:
          lambda: 'return ha_api_state_connected();'
        then:
          - script.execute: navigate_after_api
        else:
          - if:
              condition:
                lambda: 'return id(button_order).state.empty();'
              then:
                - script.execute: trmnl_hide_topbar
                - lvgl.page.show: ha_setup_page
                - script.execute: trmnl_onboarding_refresh
              else:
                - script.execute: navigate_after_api

  on_disconnect:
    - script.execute: network_status_refresh
    - if:
        condition:
          lambda: 'return !id(boot_grace_period);'
        then:
          - script.execute: wifi_reconnect_flow

api:
  on_client_connected:
    - delay: 2s
    - if:
        condition:
          lambda: 'return ha_api_state_connected();'
        then:
          - if:
              condition:
                lambda: 'return lv_scr_act() == id(ha_setup_page)->obj;'
              then:
                - script.execute: navigate_after_api
              else:
                - script.execute: navigate_after_api

esphome:
  on_boot:
    - priority: -250
      then:
        - lvgl.resume:
        - lvgl.page.show: loading_page
        - script.execute: trmnl_hide_topbar
        - delay: 500ms
        - script.execute: trmnl_onboarding_refresh
    - priority: -150
      then:
        - if:
            condition:
              and:
                - not:
                    wifi.connected:
                - lambda: 'return !wifi::global_wifi_component->has_sta();'
            then:
              - lambda: |-
                  lv_label_set_text(id(loading_status_icon), "${icon_wifi}");
                  lv_label_set_text(id(loading_status_title), "WiFi Setup");
                  lv_label_set_text(id(loading_status_label), "Connect to WiFi\n${friendly_name}\nOpen 192.168.4.1");
              - script.execute: trmnl_onboarding_refresh
    - priority: -100
      then:
        - if:
            condition:
              lambda: 'return wifi::global_wifi_component->has_sta();'
            then:
              - lambda: |-
                  lv_label_set_text(id(loading_status_label), "Connecting to WiFi");
              - script.execute: trmnl_onboarding_refresh
              - delay: 5s
              - lambda: 'id(boot_grace_period) = false;'
              - if:
                  condition:
                    and:
                      - wifi.connected:
                      - lambda: 'return lv_scr_act() == id(loading_page)->obj;'
                  then:
                    - script.execute: navigate_after_api
                  else:
                    - if:
                        condition:
                          not:
                            wifi.connected:
                        then:
                          - script.execute: wifi_reconnect_flow
            else:
              - lambda: 'id(boot_grace_period) = false;'
              - script.execute: wifi_show_hotspot_setup
