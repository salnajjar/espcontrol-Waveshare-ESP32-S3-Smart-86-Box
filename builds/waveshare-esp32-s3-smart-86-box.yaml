# =============================================================================
# BUILD PROFILE - Waveshare ESP32-S3 Smart 86 Box (4" square)
# =============================================================================
# CI/local build entry point for the 480x480 square ESP32-S3 panel.
# =============================================================================

substitutions:
  name: "espcontrol-s3-smart86"
  friendly_name: "Waveshare ESP32-S3 Smart 86 Box"
  espcontrol_component_url: "file:///config"
  espcontrol_component_ref: "HEAD"

esphome:
  name_add_mac_suffix: true

packages:
  espcontrol: !include ../devices/waveshare-esp32-s3-smart-86-box/packages.yaml

wifi:
  # Compile-only station credentials for CI/local builds. User-imported
  # deployed configs supply their real WiFi credentials in device YAML.
  ssid: "ESPControl"
  password: "espcontrol"
  ap:
    ssid: "${friendly_name}"

captive_portal:
